# Plugin coordinates
pluginGroup = com.vanillasource.eliot
pluginVersion = 0.1.0

# IntelliJ target. 2025.2 (build 252) is the IDEA baseline; LSP4IJ works on all editions and versions,
# so this can be lowered if older-IDE reach is needed.
platformType = IC
platformVersion = 2025.2

# Dependency plugins (Marketplace ids). LSP4IJ is the LSP client; bump as new versions ship.
lsp4ijVersion = 0.19.3

# Build compatibility range. untilBuild is left open so the plugin keeps loading on newer IDEs.
pluginSinceBuild = 252

# The IDE already provides the Kotlin runtime; never bundle the stdlib into the plugin.
kotlin.stdlib.default.dependency = false

# Gradle hygiene. Configuration cache is left off: the server-jar bundling shells out to
# ide/lsp/package.sh (which drives Mill), and keeping it simple avoids first-run cache friction.
org.gradle.caching = true
